name: Quality

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting and lint
        run: npm run lint

      - name: Check TypeScript and Svelte
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Run PCB performance guard
        run: npm run test:performance

      - name: Build Electron application
        run: npm run build

      - name: Upload tagged build
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: altium-diff-studio-${{ github.ref_name }}
          path: out/
          if-no-files-found: error
          retention-days: 30
