name: Quality

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify tag matches application version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: test "${GITHUB_REF_NAME#v}" = "$(node -p "require('./package.json').version")"

      - name: Check formatting and lint
        run: npm run lint

      - name: Check TypeScript and Svelte
        run: npm run check

      - name: Run unit tests
        run: npm test

      - name: Run PCB performance guard
        run: npm run test:performance

      - name: Build Electron application
        run: npm run build

      - name: Upload tagged build
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: altium-diff-studio-${{ github.ref_name }}
          path: out/
          if-no-files-found: error
          retention-days: 30

  package-windows:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: validate
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build unsigned Windows installer
        run: npm run dist:win

      - name: Test install, update and uninstall
        run: npm run test:installer

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: altium-diff-studio-windows-${{ github.ref_name }}-unsigned
          path: release/*-unsigned.exe
          if-no-files-found: error
          retention-days: 30
